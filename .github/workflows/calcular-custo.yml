name: Calcular custo da tarefa

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  calcular:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dados
        uses: actions/checkout@v4

      - name: Calcular custo e congelar valor/hora
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Carrega bancos de dados versionados
            const colaboradores = JSON.parse(fs.readFileSync('dados/colaboradores.json', 'utf8')).colaboradores;
            const catalogo = JSON.parse(fs.readFileSync('dados/catalogo-servicos.json', 'utf8')).servicos;

            const issue = context.payload.issue;
            if (!issue) { core.info('Sem issue no evento.'); return; }
            const body = issue.body || '';

            // Le campos no formato "chave: valor" dentro do bloco de dados da tarefa
            function campo(nome) {
              const re = new RegExp('^\\s*' + nome + '\\s*:\\s*(.+)$', 'im');
              const m = body.match(re);
              return m ? m[1].trim() : null;
            }

            const idServico = campo('servico');
            const idExecutor = campo('executor');
            const quantidade = parseFloat((campo('quantidade') || '').replace(',', '.'));

            if (!idServico || !idExecutor || isNaN(quantidade)) {
              core.info('Faltam campos (servico, executor, quantidade). Calculo ignorado.');
              return;
            }

            const servico = catalogo.find(s => s.id === idServico);
            const colab = colaboradores.find(c => c.id === idExecutor);

            if (!servico) { core.warning('Servico nao encontrado: ' + idServico); return; }
            if (!colab) { core.warning('Colaborador nao encontrado: ' + idExecutor); return; }

            const horasUnd = servico.horas_por_unidade;
            const horasTotal = +(horasUnd * quantidade).toFixed(3);

            // valor_hora_aplicado: snapshot congelado. Se ja existe no corpo, respeita-o.
            let valorHoraAplicado = parseFloat((campo('valor_hora_aplicado') || '').replace(',', '.'));
            if (isNaN(valorHoraAplicado)) {
              valorHoraAplicado = colab.valor_hora_vigente;
            }

            let custoTotal = null;
            let avisoValor = '';
            if (valorHoraAplicado === null || valorHoraAplicado === undefined) {
              avisoValor = '\n> :warning: **valor/hora do colaborador ainda nao cadastrado** em `dados/colaboradores.json`. Custo nao calculado.';
            } else {
              custoTotal = +(horasTotal * valorHoraAplicado).toFixed(2);
            }

            const fmt = (n) => 'R$ ' + Number(n).toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});

            const bloco = [
              '<!-- CALCULO-AUTOMATICO -->',
              '### Calculo automatico de custo',
              '| Campo | Valor |',
              '|---|---|',
              '| Servico | ' + servico.nome + ' |',
              '| Executor | ' + colab.nome + ' |',
              '| Quantidade | ' + quantidade + ' ' + servico.unidade + ' |',
              '| Horas / unidade | ' + horasUnd + ' h |',
              '| **Horas totais** | **' + horasTotal + ' h** |',
              '| Valor/hora aplicado (congelado) | ' + (valorHoraAplicado != null ? fmt(valorHoraAplicado) : '-') + ' |',
              '| **Custo total previsto** | **' + (custoTotal != null ? fmt(custoTotal) : '-') + '** |',
              avisoValor,
              '<!-- /CALCULO-AUTOMATICO -->'
            ].join('\n');

            // Atualiza ou cria comentario unico de calculo
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number
            });
            const existente = comments.find(c => c.body.includes('<!-- CALCULO-AUTOMATICO -->'));
            if (existente) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existente.id, body: bloco
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, body: bloco
              });
            }
            core.info('Custo calculado: ' + (custoTotal != null ? custoTotal : 'pendente valor/hora'));
